services:
  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
